<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; margin:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}

.book {
  border-radius:10px;
  padding:15px;
  text-align:center;
  cursor:pointer;
  background:#f5f5f5;
  box-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

.owned { background:#c8f7c5; }
.extra { background:#c5d9f7; }

#detail { display:none; }

@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
  .book { font-size:18px; }
}
</style>
</head>

<body>

<h2>жЬђж£Ъ</h2>

<select id="filter">
<option value="all">еЕ®гБ¶</option>
<option value="owned">дњЭжЬЙ</option>
<option value="not">жЬ™дњЭжЬЙ</option>
<option value="extra">ињљеК†</option>
</select>

<div id="books" class="grid"></div>

<div id="detail">
<h2 id="title"></h2>
<p id="status"></p>
<p id="type"></p>

<button onclick="toggle()">дњЭжЬЙеИЗжЫњ</button>
<button onclick="back()">жИїгВЛ</button>
</div>

<script>
const API = "гБУгБУгБЂAppsScriptгБЃURL";

let data = [];
let currentItem = null;

// еПЦеЊЧ
function load(){
 fetch(API)
 .then(r=>r.json())
 .then(d=>{
   data = d;
   render(d);
 });
}

// жППзФї
function render(list){
 const el=document.getElementById("books");
 el.innerHTML="";

 list.forEach(item=>{
   const div=document.createElement("div");
   div.className="book";

   if(item.owned) div.classList.add("owned");
   if(item.type==="ињљеК†") div.classList.add("extra");

   div.innerHTML = `рЯУШ<br>${item.name}<br>${item.type}`;

   div.onclick=()=>openBook(item);
   el.appendChild(div);
 });
}

// и©≥зі∞и°®з§Ї
function openBook(item){
 currentItem=item;

 document.getElementById("books").style.display="none";
 document.getElementById("detail").style.display="block";

 document.getElementById("title").textContent=item.name;
 document.getElementById("status").textContent="дњЭжЬЙ: "+(item.owned?"вЬФ":"вЬЦ");
 document.getElementById("type").textContent="з®ЃеИ•: "+item.type;
}

// жИїгВЛ
function back(){
 document.getElementById("books").style.display="grid";
 document.getElementById("detail").style.display="none";
 load();
}

// дњЭжЬЙеИЗжЫњ
function toggle(){
 currentItem.owned = !currentItem.owned;

 fetch(API, {
   method:"POST",
   body:JSON.stringify(currentItem)
 }).then(()=>load());
}

// гГХгВ£гГЂгВњгГЉ
document.getElementById("filter").addEventListener("change", e=>{
 const v=e.target.value;

 let filtered=data.filter(d=>{
   if(v==="owned") return d.owned;
   if(v==="not") return !d.owned;
   if(v==="extra") return d.type==="ињљеК†";
   return true;
 });

 render(filtered);
});

load();
</script>

</body>
</html>

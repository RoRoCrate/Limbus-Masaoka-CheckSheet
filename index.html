<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:serif;
  background:#e6ded3;
}

/* タイトル */
header{
  background:#3e2723;
  color:white;
  padding:12px;
  text-align:center;
  font-size:18px;
}

/* セクションタイトル */
.section-title{
  background:#5d4037;
  color:white;
  padding:10px;
}

/* 棚 */
.shelf{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:12px;
  background:#d7ccc8;
  border-bottom:6px solid #4e342e;
}

/* 本（背表紙） */
.book{
  width:60px;
  height:180px;
  background:#8d6e63;
  color:white;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  padding:5px;
  cursor:pointer;
  border-radius:4px;
  font-size:12px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  transition:0.2s;
}

.book:hover{
  transform:translateY(-5px);
}

/* 状態 */
.owned{
  background:#5d4037;
}

.not-owned{
  background:#bcaaa4;
  opacity:0.6;
}

/* 追加 */
.extra{
  border-left:4px solid #2196f3;
}

/* スマホ */
@media(max-width:600px){
  .book{
    height:120px;
    width:45px;
    font-size:10px;
  }
}
</style>
</head>

<body>

<header>Library System</header>

<div id="books"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzEA00F2y8kX95Zg01EoekoOgZO7gxyntNSQ6QtrcYLCaBto21pW8IyZLrTcKT1oCIlGw/exec";

const categories = [
  "identity",
  "singularidentity",
  "ego",
  "suppassive",
  "mental"
];

let db = {};

// 読み込み
function load(){
 fetch(API_URL)
 .then(r=>r.json())
 .then(data=>{
   db = data;
   renderAll();
 });
}

// 描画（図書館構造）
function renderAll(){
 const container = document.getElementById("books");
 container.innerHTML = "";

 categories.forEach(cat=>{
   // タイトル
   const title = document.createElement("div");
   title.className = "section-title";
   title.textContent = cat;
   container.appendChild(title);

   // 棚
   const shelf = document.createElement("div");
   shelf.className = "shelf";

   db[cat].forEach(item=>{
     const div = document.createElement("div");
     div.className = "book";

     if(item.owned){
       div.classList.add("owned");
     }else{
       div.classList.add("not-owned");
     }

     if(item.type==="追加"){
       div.classList.add("extra");
     }

     div.textContent = item.name;

     // ✅ クリックで切替
     div.onclick = ()=>toggleItem(item,cat);

     shelf.appendChild(div);
   });

   container.appendChild(shelf);
 });
}

// トグル
function toggleItem(item,cat){
 item.owned = !item.owned;

 fetch(API_URL,{
   method:"POST",
   body:JSON.stringify({
     name:item.name,
     owned:item.owned,
     sheet:cat
   })
 }).then(()=>load());
}

// 初期化
load();
</script>

</body>
</html>
